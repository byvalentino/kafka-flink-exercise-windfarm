# =============================================================
# Wind Farm Streaming Workshop — Infrastructure as Code
# =============================================================
# Simulates a wind farm SCADA data pipeline:
#   Turbines → Kafka → Flink → Monitoring / Asset Mgmt / Grid
#
# This is LOCAL infrastructure-as-code (Docker Compose).
# See PRODUCTION_MAPPING.md for cloud equivalents.
#
# Usage:
#   docker compose up -d
#   docker compose ps
#   docker compose down -v
#
# Web UIs:
#   Kafka UI:        http://localhost:8080
#   Flink Dashboard: http://localhost:8081
# =============================================================

services:
  # ---- KAFKA (KRaft mode — no ZooKeeper) ----
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
      - "9094:9094"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    volumes:
      - kafka-data:/var/lib/kafka/data

  # ---- KAFKA UI ----
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: windfarm
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  # ---- FLINK JobManager ----
  flink-jobmanager:
    image: flink:1.18-java11
    container_name: flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
        execution.checkpointing.interval: 10s
        state.backend: hashmap
        state.checkpoints.dir: file:///tmp
    volumes:
      - flink-checkpoints:/tmp/flink-checkpoints

  # ---- FLINK TaskManager ----
  flink-taskmanager:
    image: flink:1.18-java11
    container_name: flink-taskmanager
    command: taskmanager
    depends_on:
      - flink-jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
        execution.checkpointing.interval: 10s
        state.backend: hashmap
        state.checkpoints.dir: file:///tmp
    volumes:
      - flink-checkpoints:/tmp/flink-checkpoints

  # ---- PYFLINK RUNNER (Lab 3) ----
  pyflink-runner:
    build:
      context: .
      dockerfile: Dockerfile.pyflink
    container_name: pyflink-runner
    profiles: ["pyflink"]
    depends_on:
      - flink-jobmanager
      - kafka
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
    volumes:
      - ./pyflink:/opt/pyflink-jobs
    command: ["sleep", "infinity"]
    working_dir: /opt/pyflink-jobs

volumes:
  kafka-data:
  flink-checkpoints:
