# =============================================================
# Wind Farm Streaming Workshop — Infrastructure as Code
# =============================================================
# Simulates a wind farm SCADA data pipeline:
#   Turbines → Kafka → Flink → Monitoring / Asset Mgmt / Grid
#
# This is LOCAL infrastructure-as-code (Docker Compose).
# See PRODUCTION_MAPPING.md for cloud equivalents.
#
# Usage:
#   docker compose up -d
#   docker compose ps
#   docker compose down -v
#
# Web UIs:
#   Kafka UI:        http://localhost:8080
#   Flink Dashboard: http://localhost:8081
# =============================================================

version: "3.8"

services:
  # ---- KAFKA (KRaft mode — no ZooKeeper) ----
  kafka:
    image: bitnami/kafka:3.7
    container_name: kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_LOG_RETENTION_HOURS: 1
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - kafka-data:/bitnami/kafka

  # ---- KAFKA UI ----
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: windfarm
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  # ---- FLINK JobManager ----
  flink-jobmanager:
    image: flink:1.18-java11
    container_name: flink-jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
        execution.checkpointing.interval: 10s
        state.backend: hashmap
        state.checkpoints.dir: file:///tmp/flink-checkpoints
    volumes:
      - flink-checkpoints:/tmp/flink-checkpoints

  # ---- FLINK TaskManager ----
  flink-taskmanager:
    image: flink:1.18-java11
    container_name: flink-taskmanager
    command: taskmanager
    depends_on:
      - flink-jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
        execution.checkpointing.interval: 10s
        state.backend: hashmap
        state.checkpoints.dir: file:///tmp/flink-checkpoints
    volumes:
      - flink-checkpoints:/tmp/flink-checkpoints

  # ---- PYFLINK RUNNER (Lab 3) ----
  pyflink-runner:
    build:
      context: .
      dockerfile: Dockerfile.pyflink
    container_name: pyflink-runner
    profiles: ["pyflink"]
    depends_on:
      - flink-jobmanager
      - kafka
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
    volumes:
      - ./pyflink:/opt/pyflink-jobs
    command: ["sleep", "infinity"]
    working_dir: /opt/pyflink-jobs

volumes:
  kafka-data:
  flink-checkpoints:
